    global:
      scrape_interval: 5s
      scrape_timeout: 5s
    scrape_configs:
      - job_name: 'tarantula.prometheus'
        static_configs:
          - targets: ['prometheus:9090']
      
      - job_name: 'tarantula.node'
        static_configs:
          - targets: ['node:9100']     

      - job_name: 'tarantula.presence'
        metrics_path: /presence/metrics
        static_configs:
          - targets: ['presence:8080']
        bearer_token_file: '/etc/prometheus/token.txt'

      - job_name: 'tarantula.admin'
        metrics_path: /admin/metrics
        static_configs:
          - targets: ['admin:8080']
        bearer_token_file: '/etc/prometheus/token.txt'

      - job_name: 'tarantula.asset'
        metrics_path: /asset/metrics
        static_configs:
          - targets: ['asset:8080']
        bearer_token_file: '/etc/prometheus/token.txt'

      - job_name: 'tarantula.inventory'
        metrics_path: /inventory/metrics
        static_configs:
          - targets: ['inventory:8080']
        bearer_token_file: '/etc/prometheus/token.txt'

          