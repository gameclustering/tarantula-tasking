name: tarantula-app
services:
  postoffice:
    stop_grace_period: 20s
    restart: unless-stopped
    container_name: postoffice
    hostname: postoffice
    image: ${PREFIX}/tarantula.postoffice:${VERSION}
    network_mode: "host"
    volumes:
      - volume_postoffice:/home/tarantula/postoffice
    env_file:
      - .env  
  cloud:
    stop_grace_period: 20s
    restart: unless-stopped
    container_name: cloud
    environment:
      - POST_OFFICE_HOST=host.docker.internal
    hostname: cloud
    image: ${PREFIX}/tarantula.cloud:${VERSION}
    volumes:
      - volume_cloud:/home/tarantula/cloud
    depends_on:
      - postoffice
    extra_hosts:
      - "host.docker.internal:host-gateway"       
    networks:
      - tarantula-app-net
    env_file:
      - .env 
  admin:
    stop_grace_period: 20s
    restart: unless-stopped
    container_name: admin
    environment:
      - POST_OFFICE_HOST=host.docker.internal
    hostname: admin
    image: ${PREFIX}/tarantula.admin:${VERSION}
    volumes:
      - volume_admin:/home/tarantula/admin  
    depends_on:
      - cloud
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    networks:
      - tarantula-app-net
    env_file:
      - .env  
  web:
    restart: unless-stopped
    container_name: web
    hostname: web
    image: ${PREFIX}/tarantula.caddy:${VERSION}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tarantula-app-net
    env_file:
      - .env   

networks:
  tarantula-app-net:
    external: true
volumes:
  volume_postoffice:
  volume_cloud:
  volume_admin:
